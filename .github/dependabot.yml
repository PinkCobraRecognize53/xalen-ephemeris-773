version: 2
updates:
  # Rust crates (the whole Cargo workspace)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions used by the CI / CodeQL workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # npm dependencies of the Node.js (N-API) binding
  - package-ecosystem: "npm"
    directory: "/crates/xalen-node"
    schedule:
      interval: "weekly"
