name: ✨ Feature Request
description: Suggest a new feature, tradition, or enhancement
title: "[FEATURE] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please help us understand your use case.
        Check first whether it's already been requested.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight Checklist
      options:
        - label: I have searched existing requests and this hasn't been requested yet
          required: true
        - label: This is a single feature request (not multiple features)
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve? Focus on the problem, not the solution.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work? Describe the ideal API / behaviour.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Area
      options:
        - Planetary positions / ephemeris accuracy
        - Houses / ascendant
        - Ayanamsa / sidereal
        - Vedic / Jyotish
        - Western
        - Chinese
        - Other traditions
        - Lunar nodes / fixed stars
        - Chart rendering
        - Bindings (Python / Node / WASM / C-FFI)
        - Performance
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical - Blocking my work
        - High - Significant impact
        - Medium - Would be very helpful
        - Low - Nice to have
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: Reference (for an astrology/astronomy feature)
      description: If proposing a new tradition/algorithm, cite the authoritative source (classical text + chapter, IAU model, or reference software) so it can be implemented and validated correctly.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
    validations:
      required: false
